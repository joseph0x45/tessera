{{define "app"}}
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tessera — {{.App.Name}}</title>
  <script src="/tailwindcss"></script>
  <style>
    input:focus {
      outline: none;
      border-color: rgba(255, 255, 255, 0.3);
    }
  </style>
</head>

<body class="min-h-screen bg-stone-900 text-stone-200">

  <div class="max-w-2xl mx-auto px-6 py-12">

    {{/* Header */}}
    <div class="flex items-center justify-between mb-10">
      <div>
        <a href="/dashboard"
          class="text-xs text-stone-500 hover:text-stone-300 tracking-widest uppercase transition-colors">
          ← Apps
        </a>
        <p class="text-base tracking-[0.2em] uppercase text-stone-200 mt-2">{{.App.Name}}</p>
        <p class="text-xs text-stone-500 mt-0.5 font-mono">{{.App.ID}}</p>
      </div>
      <form method="POST" action="/dashboard/logout">
        <button type="submit"
          class="text-xs text-stone-500 hover:text-stone-300 tracking-widest uppercase transition-colors">
          Logout
        </button>
      </form>
    </div>

    {{/* Error */}}
    {{if .Error}}
    <p class="text-xs text-red-400 mb-6">{{.Error}}</p>
    {{end}}

    {{/* User list */}}
    {{if .Users}}
    <ul class="space-y-2">
      {{range .Users}}
      <li class="flex items-center justify-between px-4 py-3 bg-stone-800 border border-stone-700 rounded-lg">
        <span class="text-sm text-stone-200">{{.Name}}</span>
        <form method="POST" action="/dashboard/apps/{{.AppID}}/users/{{.ID}}/delete">
          <button type="submit" onclick="return confirm('Delete {{.Name}}?')"
            class="text-xs text-stone-600 hover:text-red-400 tracking-widest uppercase transition-colors ml-4">
            Delete
          </button>
        </form>
      </li>
      {{end}}
    </ul>
    {{else}}
    <p class="text-sm text-stone-600 text-center mt-16">No users yet.</p>
    {{end}}

  </div>

</body>

</html>
{{end}}
